<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Geo-Sharding - Grab Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00B14F; /* Màu xanh Grab */
            --primary-glow: rgba(0, 177, 79, 0.4);
            --bg-dark: #0A0E12;
            --card-bg: #1A1F26;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --warning: #F59E0B;
            --success: #10B981;
            --border-color: #2D3748;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            height: 100vh;
        }

        /* Vùng bản đồ */
        .game-viewport {
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            cursor: crosshair;
        }

        #map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }

        .region {
            width: 50%;
            height: 100%;
            position: relative;
            border-right: 2px dashed rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease;
        }

        .region-label {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .region.active {
            background: rgba(0, 177, 79, 0.05);
        }

        .region.active .region-label {
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Nhân vật xe */
        #player {
            position: absolute;
            width: 52px;
            height: 52px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 35px var(--primary-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: grab;
            transition: transform 0.1s linear;
        }

        #player::after { content: "🚗"; font-size: 28px; }
        #player:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.1); }

        /* Bảng điều khiển */
        .side-panel {
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
        .brand .logo {
            width: 36px; height: 36px; background: var(--primary);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 1.2rem;
        }
        .brand h2 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .stat-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            padding: 1rem; border-radius: 12px; transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: var(--primary); background: rgba(0, 177, 79, 0.02); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 1rem; font-weight: 700; margin-top: 6px; color: var(--text-main); }

        .btn-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .btn {
            padding: 0.8rem 1rem; border-radius: 12px; border: none;
            font-weight: 700; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(0, 177, 79, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .log-container { flex: 1; display: flex; flex-direction: column; gap: 0.8rem; min-height: 0; }
        .log-header { display: flex; justify-content: space-between; align-items: center; }
        .log-header h3 { font-size: 0.9rem; text-transform: uppercase; color: var(--text-muted); }
        
        #log-list {
            background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 1.2rem;
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
            overflow-y: auto; flex: 1; border: 1px solid var(--border-color);
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 0.6rem; padding-bottom: 0.6rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .log-entry.success { color: var(--success); }
        .log-entry.error { color: var(--danger); font-weight: 600; }
        .log-entry.warning { color: var(--warning); }

        #failure-overlay { position: absolute; bottom: 2rem; right: 26rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.8rem; }
        .alert { 
            padding: 1.2rem; border-radius: 10px; background: #1A1F26; border-left: 5px solid var(--danger);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: slideIn 0.3s ease-out;
            min-width: 280px;
        }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Vùng Bản Đồ Thực Tế -->
        <main class="game-viewport">
            <div id="map-grid">
                <div class="region paris active">
                    <div class="region-label">PARIS / SHARD EU-WEST</div>
                </div>
                <div class="region london">
                    <div class="region-label">LONDON / SHARD EU-NORTH</div>
                </div>
            </div>
            
            <div id="player" title="Dùng WASD hoặc Kéo thả để di chuyển"></div>
            <div id="failure-overlay"></div>
        </main>

        <!-- Bảng Điều Khiển Bên Phải -->
        <aside class="side-panel">
            <div class="brand">
                <div class="logo">G</div>
                <h2>Hệ Thống Grab Sharding</h2>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Thành Phố</div>
                    <div class="stat-value" id="current-city">Paris</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Phân vùng Shard</div>
                    <div class="stat-value" id="shard-target">EU-West</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Mã Tài Xế</div>
                    <div class="stat-value">DRIVER01</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Trạng Thái</div>
                    <div class="stat-value" id="op-status" style="color: var(--text-muted)">Đang chờ...</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btn-toggle">🚀 BẮT ĐẦU ĐỒNG BỘ</button>
                <button class="btn btn-outline" id="btn-reset">Đặt lại vị trí</button>
            </div>

            <div class="log-container">
                <div class="log-header">
                    <h3>Nhật Ký Hệ Thống</h3>
                    <span style="font-size: 0.65rem; color: var(--primary);">Real-time</span>
                </div>
                <div id="log-list">
                    <div class="log-entry">Hệ thống đã sẵn sàng. Vui lòng bấm Bắt đầu.</div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const REVALIDATE_INTERVAL = 4000;

        class Game {
            constructor() {
                // Khởi tạo 2 tài xế
                this.drivers = [
                    { id: "DRIVER01", x: 20, y: 40, color: '#00B14F', city: 'Paris', shard: 'EU-West' },
                    { id: "DRIVER02", x: 25, y: 60, color: '#EF4444', city: 'Paris', shard: 'EU-West' }
                ];
                this.activeIndex = 0; // Tài xế đang được điều khiển
                
                this.isRunning = false;
                this.timer = null;
                this.isDragging = false;
                this.keys = {};
                this.init();
            }

            init() {
                this.viewport = document.querySelector('.game-viewport');
                this.btnToggle = document.getElementById('btn-toggle');
                this.failureOverlay = document.getElementById('failure-overlay');
                
                // Tạo các phần tử xe trên map
                this.drivers.forEach((d, index) => {
                    const el = document.createElement('div');
                    el.id = `player-${index}`;
                    el.className = 'driver-car';
                    el.style.position = 'absolute';
                    el.style.width = '48px';
                    el.style.height = '48px';
                    el.style.borderRadius = '50%';
                    el.style.display = 'flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    el.style.zIndex = '100';
                    el.style.cursor = 'grab';
                    el.style.background = d.color;
                    el.style.boxShadow = `0 0 20px ${d.color}66`;
                    el.innerHTML = `<span style="font-size: 24px">🚗</span><div style="position:absolute; bottom:-20px; font-size:10px; font-weight:800; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px; white-space:nowrap">${d.id}</div>`;
                    
                    el.addEventListener('mousedown', (e) => {
                        this.activeIndex = index;
                        this.isDragging = true;
                        this.updateUI();
                        e.stopPropagation();
                    });

                    this.viewport.appendChild(el);
                    d.el = el;
                });

                // Điều khiển phím
                window.addEventListener('keydown', e => {
                    this.keys[e.key.toLowerCase()] = true;
                    // Phím 1, 2 để đổi tài xế
                    if (e.key === '1') { this.activeIndex = 0; this.updateUI(); this.log("Đã chọn DRIVER01", "success"); }
                    if (e.key === '2') { this.activeIndex = 1; this.updateUI(); this.log("Đã chọn DRIVER02", "success"); }
                });
                window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
                
                // Kéo thả toàn cục
                window.addEventListener('mouseup', () => { this.isDragging = false; });
                window.addEventListener('mousemove', e => {
                    if (!this.isDragging) return;
                    const r = this.viewport.getBoundingClientRect();
                    const d = this.drivers[this.activeIndex];
                    d.x = ((e.clientX - r.left) / r.width) * 100;
                    d.y = ((e.clientY - r.top) / r.height) * 100;
                });

                this.btnToggle.addEventListener('click', () => this.toggleRevalidate());
                document.getElementById('btn-reset').addEventListener('click', () => { 
                    this.drivers[0].x = 20; this.drivers[0].y = 40;
                    this.drivers[1].x = 25; this.drivers[1].y = 60;
                    this.log("Đã đặt lại vị trí đội xe", "warning");
                });

                this.updateUI();
                this.gameLoop();
            }

            getCity(x) { return x < 50 ? "Paris" : "London"; }

            updateUI() {
                const d = this.drivers[this.activeIndex];
                document.getElementById('current-city').textContent = d.city;
                document.getElementById('shard-target').textContent = d.shard;
                document.getElementById('display-driver-id').textContent = d.id;
                
                // Highlight xe đang chọn
                this.drivers.forEach((drv, idx) => {
                    drv.el.style.border = (idx === this.activeIndex) ? "3px solid white" : "none";
                    drv.el.style.transform = (idx === this.activeIndex) ? "translate(-50%, -50%) scale(1.1)" : "translate(-50%, -50%) scale(1)";
                    drv.el.style.zIndex = (idx === this.activeIndex) ? "200" : "100";
                });
            }

            gameLoop() {
                // Di chuyển xe đang active
                const d = this.drivers[this.activeIndex];
                const speed = 1.8;
                if (!this.isDragging) {
                    if (this.keys['w'] || this.keys['arrowup']) d.y -= speed;
                    if (this.keys['s'] || this.keys['arrowdown']) d.y += speed;
                    if (this.keys['a'] || this.keys['arrowleft']) d.x -= speed;
                    if (this.keys['d'] || this.keys['arrowright']) d.x += speed;
                }

                // Cập nhật vị trí và hiển thị cho TẤT CẢ các xe
                this.drivers.forEach(drv => {
                    drv.x = Math.max(2, Math.min(98, drv.x));
                    drv.y = Math.max(2, Math.min(98, drv.y));
                    drv.el.style.left = `${drv.x}%`;
                    drv.el.style.top = `${drv.y}%`;
                    
                    drv.city = this.getCity(drv.x);
                    drv.shard = drv.city === "Paris" ? "EU-West" : "EU-North";
                });

                // Update Active City UI
                const activeCity = this.drivers[this.activeIndex].city;
                document.getElementById('current-city').textContent = activeCity;
                document.getElementById('shard-target').textContent = this.drivers[this.activeIndex].shard;

                document.querySelectorAll('.region').forEach(r => {
                    const isParisRegion = r.classList.contains('paris');
                    r.classList.toggle('active', (isParisRegion && activeCity === 'Paris') || (!isParisRegion && activeCity === 'London'));
                });

                requestAnimationFrame(() => this.gameLoop());
            }

            toggleRevalidate() {
                this.isRunning = !this.isRunning;
                this.btnToggle.textContent = this.isRunning ? '🛑 DỪNG ĐỒNG BỘ' : '🚀 BẮT ĐẦU ĐỒNG BỘ';
                this.btnToggle.style.background = this.isRunning ? 'var(--danger)' : 'var(--primary)';
                
                if (this.isRunning) {
                    this.log("Hệ thống đội xe hoạt động. Đang đồng bộ...", "success");
                    this.timer = setInterval(() => this.revalidateAll(), REVALIDATE_INTERVAL);
                    this.revalidateAll();
                } else {
                    clearInterval(this.timer);
                    this.log("Đã dừng đồng bộ đội xe.", "warning");
                    document.getElementById('op-status').textContent = "Đã dừng";
                }
            }

            // Đồng bộ TẤT CẢ lái xe lên Gateway
            async revalidateAll() {
                for (const d of this.drivers) {
                    await this.syncDriver(d);
                }
            }

            async syncDriver(d) {
                const shardName = d.city === 'Paris' ? 'EU-West' : 'EU-North';
                const payload = { 
                    DriverID: d.id, 
                    City: d.city, 
                    Lat: Math.round(d.y), 
                    Long: Math.round(d.x) 
                };

                try {
                    const res = await fetch('/write', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        this.log(`⛔ ${d.id}: Không có kết nối đến Shard ${shardName} (${d.city})`, "error");
                        return;
                    }
                    
                    if (data.status === 'migrated') {
                        this.log(`DI TRÚ: ${d.id} ➔ ${data.to}`, "warning");
                    }
                    
                    if (d.id === this.drivers[this.activeIndex].id) {
                        document.getElementById('op-status').textContent = data.status === 'migrated' ? 'Vừa di trú' : 'Đã cập nhật';
                        document.getElementById('op-status').style.color = data.status === 'migrated' ? 'var(--warning)' : 'var(--success)';
                    }
                } catch (e) {
                    this.log(`⛔ Không có kết nối đến hệ thống`, "error");
                }
            }

            log(msg, type = "") {
                const list = document.getElementById('log-list');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${msg}`;
                list.prepend(entry);
                if (list.children.length > 30) list.removeChild(list.lastChild);
            }
        }

        window.onload = () => { 
            // Khớp nhãn UI cho thông tin tài xế
            const driverInfoCard = document.querySelectorAll('.stat-card')[2];
            driverInfoCard.innerHTML = `<div class="stat-label">Mã Tài Xế Đang Chọn</div><div class="stat-value" id="display-driver-id">DRIVER01</div>`;
            
            new Game(); 
        };
    </script>
</body>
</html>
